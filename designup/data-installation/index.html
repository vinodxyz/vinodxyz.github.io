<!DOCTYPE html>
<head>

    <link rel="stylesheet" href="styles/bootstrap.min.css">
    <script src="scripts/jquery-1.12.4.js"></script>
    <script src="scripts/d3.v4.min.js"></script>
    <!-- <script src="data/data.js"></script> -->

    <script src="scripts/popper.min.js"></script>
    <script src="scripts/bootstrap.min.js"></script>
    <link href="styles/icon.css" rel="stylesheet">

    <link rel="stylesheet" href="styles/materialize.min.css">
    <script src="scripts/materialize.min.js"></script>
    <link href="https://fonts.googleapis.com/css?family=Montserrat|Open+Sans" rel="stylesheet">

    <meta charset="utf-8">
    <link href="main.css" rel="stylesheet" type="text/css" media="all">
    <script src="scripts/jquery.easy-autocomplete.js"></script>
    <link href="styles/easy-autocomplete.css" rel="stylesheet" type="text/css" media="all">
     
</head>

<body>
    <div id="installation-section" class="container-fluid">
        <div class="row">
            <div class="col-lg-2">
                <img src="images/dup-logo-new.png" width="50%">

                <div class="intro">
                    Want to meet interesting people who can help you with something?<br>
                    Or, do you want to meet folks who need help with something that you're good at?<br>
                    Let's try to connect you.
                </div>

                <div id="input-form">

                    <div class="input-field">
                        <input id="txtUsername" type="text" class="validate">
                        <label for="txtUsername" class="labels">What's your name?</label>
                    </div>

                    <div class="input-field">
                        <input id="txtHave" type="text" class="validate">
                        <label for="txtHave">One thing that you're really good at</label>
                    </div>

                    <div class="input-field">
                        <input id="txtNeed" type="text" class="validate">
                        <label for="txtNeed">One thing you want to learn</label>
                    </div>

                    <a class="waves-effect waves-light btn pink white-text" onclick="getData();updateData();">
                        <i class="material-icons right">send</i>Connect!
                    </a>

                </div>

                <div id="list-view">
                    <div id="haves">
                        <span id="have-header">People who can give thing to you:</span>
                        <ul id="have-list"></ul>
                    </div>
                    <div id="needs">
                        <span id="need-header">People who can take thing from you:</span>
                        <ul id="need-list"></ul>
                    </div>
                    <a id="btnReset" class="waves-effect waves-light btn pink white-text" onclick="location.reload();">
                        <i class="material-icons right">refresh</i>Clear
                    </a>
                </div>

                <img id="lower-banner" src="images/layer5.png">

            </div>
            <div class="col-lg-10">    
                <div id="network-viz"></div>
                <div class="search-pane offset-lg-9 col-lg-3">
                    <label for="txtSearchUser">Search for someone</label>
                    <input id="txtSearchUser" type="text" class="validate"/>
                </div>
            </div>
        </div>
    </div>

    
    
</body>

<script src="main.js"></script>

</html>
