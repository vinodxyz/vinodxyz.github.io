<!DOCTYPE html>
<head>
    <title>FTX Data Exhibit</title>
    <meta charset="utf-8">
    <link href="https://fonts.googleapis.com/css?family=Rubik&display=swap" rel="stylesheet">
    <link href="styles/main.css" rel="stylesheet" type="text/css" media="all">
    <link href="styles/checkboxes.css" rel="stylesheet" type="text/css" media="all">
    <link href="styles/loader.css" rel="stylesheet" type="text/css" media="all">
    <script src="scripts/jquery-3.4.1.min.js"></script>
    <script src="scripts/jquery.easy-autocomplete.min.js"></script>
    <link href="styles/easy-autocomplete.min.css" rel="stylesheet">
    <script src="scripts/d3.v5.min.js"></script>
    <script src="scripts/d3-force.v2.min.js"></script>
    <script src="data/data.js"></script>
    <script src="data/razorpay-staff.js"></script>
</head>
<body>
    <div class="wrapper">
        <div class="header">FTX visualization</div>
        <div id="ftx-viz" class="ftx-grid">
            
        </div>
        <div id="ftx-ui" class="ftx-grid">

            <!-- Step 1: Name and tags -->
            <div id="input-pane">
                <div id="ftx-sign"><img src="svg/ftx-sign.svg"/></div>
                <div id="welcome-ftx" class="welcome-msg">
                    <span class="welcome-header">Welcome to FTX ! 👋</span><br>
                    <span class="welcome-body">We’ve a lot of things planned for the day. Meanwhile, you can </span>
                    <span class="welcome-highlight">network with other attendees.</span>
                </div>
                <div id="separator-line">
                    <img src="svg/separator.svg">
                </div>
                <div id="ui-name">
                    <label id="lblName">What's your name?</label><br>
                    <input type="text" id="txtName">
                </div>
                <div id="ui-tags">
                    <label id="lblTags">What are you here for?</label>
                </div>
                <div id="ui-cta">
                    <input type="button" id="btn-connect" value="Connect me" onclick="addEntry();">
                </div>
            
            <!-- Step 2: Loading... -->
                <div id="loading-msg" class="welcome-msg">
                    <span class="welcome-header">⏳ Please hold on for a second ...</span><br>
                    <span class="welcome-body">We’re finding people who’re here for similar reasons.</span>
                </div>
        
                <div id="loading-cta">
                    <span class="lbl-connect">Connecting you</span>
                    <div class="loader">
                        <div class="atom-1"></div>
                        <div class="atom-2"></div>
                        <div class="atom-3"></div>
                    </div>
                </div>

            <!-- Step 3: Paired with someone -->
                <div id="paired-msg" class="welcome-msg">
                    <span id="paired-header" class="welcome-header"></span> <br>
                    <span id="paired-body" class="welcome-body"></span>
                </div>
                
                <div id="paired-list"></div>

                <div id="paired-cta">
                    <input type="button" id="btn-restart" value="Start again" onclick="restart();">
                </div>

            </div>

        </div>
    </div>
</body>

<script src="scripts/flow.js"></script>
<script src="scripts/network.js"></script>


</html>
