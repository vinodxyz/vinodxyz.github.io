<head>
  <style>@font-face { font-family: 'Inter'; src: url('../fonts/InterVariable.woff2') format('woff2'); font-weight: 100 900; font-display: block; }</style>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body { margin: 0; overflow: hidden; background: rgba(24,24,24,0); }
    #myDiv { width: 540px; height: 304px; position: relative; }
    #imgLoad { margin-top: 80px; margin-left: 200px; }
    .axis text { fill: #ccc; font-size: 10px; font-family: 'Inter', sans-serif; }
    .axis path, .axis line { stroke: #555; }
    .axis-label { fill: #ccc; font-size: 12px; font-family: 'Inter', sans-serif; }
    .legend text { fill: #ccc; font-size: 11px; font-family: 'Inter', sans-serif; }
    .tooltip {
      position: absolute; pointer-events: none; display: none;
      background: rgba(0,0,0,0.85); color: #eee; padding: 6px 10px;
      border-radius: 4px; font-size: 11px; font-family: 'Inter', sans-serif;
      line-height: 1.5; white-space: nowrap;
    }
    .tooltip span { font-weight: bold; }
  </style>
</head>
<body>
  <div id="myDiv">
    <img id="imgLoad" src="ring.svg" alt="Loading...">
    <svg id="chart" style="display:none;"></svg>
    <div class="tooltip" id="tooltip"></div>
  </div>
  <script>

    // Parse ward from URL query string
    var ward;
    var query = window.location.search.substring(1);
    var vars = query.split("&amp;");

    for (var i = 0; i < vars.length; i++) {
      var pair = vars[i].split("=");
      if (pair[0] == "ward") {
        ward = pair[1];
      }
    }

    ward = ward.split("%20").join(" ");
    var n0 = ward + "_Female";
    var n1 = ward + "_Male";
    var n2 = ward + "_Trans";

    // Load pre-computed histogram data (157KB vs 99MB raw)
    d3.json("population_hist.json").then(function(popjson) {
      var femaleCounts = popjson.histograms[n0] || [];
      var maleCounts = popjson.histograms[n1] || [];
      var otherCounts = popjson.histograms[n2] || [];

      // Convert pre-computed counts into bin-like objects (age 18-100)
      function countsToFakeBins(counts) {
        return counts.map(function(c, i) {
          var b = []; b.length = c; b.x0 = 18 + i; b.x1 = 19 + i;
          return b;
        });
      }
      var maleBins = countsToFakeBins(maleCounts);
      var femaleBins = countsToFakeBins(femaleCounts);
      var otherBins = countsToFakeBins(otherCounts);

      // Chart dimensions (height reduced 20%: 330 -> 264)
      var totalHeight = 304;
      var margin = {top: 52, right: 100, bottom: 40, left: 55};
      var width = 540 - margin.left - margin.right;
      var height = totalHeight - margin.top - margin.bottom;

      var svg = d3.select("#chart")
        .attr("width", 540)
        .attr("height", totalHeight)
        .style("display", "block");

      var g = svg.append("g")
        .attr("transform", "translate(" + margin.left + "," + margin.top + ")");

      // Scales
      var x = d3.scaleLinear()
        .domain([18, 100])
        .range([0, width]);

      var maxCount = d3.max([
        d3.max(maleBins, function(d) { return d.length; }),
        d3.max(femaleBins, function(d) { return d.length; }),
        d3.max(otherBins, function(d) { return d.length; })
      ]);

      var y = d3.scaleLinear()
        .domain([0, maxCount])
        .nice()
        .range([height, 0]);

      // Draw bars - Males first (back), then Females, then Others (front)
      var series = [
        {bins: maleBins, color: "rgba(255,255,255,1)", label: "Males"},
        {bins: femaleBins, color: "rgba(150,150,150,1)", label: "Females"},
        {bins: otherBins, color: "rgba(71,71,72,1)", label: "Others"}
      ];

      // Build a lookup: binIndex -> {Males: n, Females: n, Others: n}
      var binLookup = maleBins.map(function(d, i) {
        return {
          age: d.x0,
          Males: maleBins[i].length,
          Females: femaleBins[i].length,
          Others: otherBins[i].length
        };
      });

      var tip = d3.select("#tooltip");

      series.forEach(function(s) {
        g.selectAll(".bar-" + s.label)
          .data(s.bins)
          .enter().append("rect")
          .attr("class", function(d) { return "bar bin-" + (d.x0 - 18); })
          .attr("x", function(d) { return x(d.x0) + 0.5; })
          .attr("width", function(d) { return Math.max(0, x(d.x1) - x(d.x0) - 1); })
          .attr("y", function(d) { return y(d.length); })
          .attr("height", function(d) { return height - y(d.length); })
          .attr("fill", s.color)
          .style("cursor", "crosshair")
          .on("mouseover", function(event, d) {
            var idx = d.x0 - 18;
            var info = binLookup[idx];
            if (!info) return;
            // Dim all bars, then highlight the hovered age bin
            g.selectAll(".bar").style("opacity", 0.15);
            g.selectAll(".bin-" + idx).style("opacity", 1);
            tip.style("display", "block")
              .html(
                "<span>Age " + info.age + "</span><br>" +
                "Males: " + info.Males + "<br>" +
                "Females: " + info.Females + "<br>" +
                "Others: " + info.Others
              );
          })
          .on("mousemove", function(event) {
            tip.style("left", (event.pageX + 12) + "px")
              .style("top", (event.pageY - 10) + "px");
          })
          .on("mouseout", function() {
            g.selectAll(".bar").style("opacity", 1);
            tip.style("display", "none");
          });
      });

      // X axis
      g.append("g")
        .attr("class", "axis")
        .attr("transform", "translate(0," + height + ")")
        .call(d3.axisBottom(x).ticks(8));

      // Y axis
      g.append("g")
        .attr("class", "axis")
        .call(d3.axisLeft(y).ticks(5));

      // X axis label
      g.append("text")
        .attr("class", "axis-label")
        .attr("x", width / 2)
        .attr("y", height + 34)
        .attr("text-anchor", "middle")
        .text("Ages");

      // Y axis label
      g.append("text")
        .attr("class", "axis-label")
        .attr("transform", "rotate(-90)")
        .attr("x", -height / 2)
        .attr("y", -42)
        .attr("text-anchor", "middle")
        .text("Population");

      // Legend
      var legend = svg.append("g")
        .attr("class", "legend")
        .attr("transform", "translate(" + (540 - margin.right + 10) + "," + margin.top + ")");

      series.forEach(function(s, i) {
        var row = legend.append("g")
          .attr("transform", "translate(0," + (i * 20) + ")");
        row.append("rect")
          .attr("width", 12)
          .attr("height", 12)
          .attr("fill", s.color)
          .attr("stroke", "#888")
          .attr("stroke-width", 0.5);
        row.append("text")
          .attr("x", 16)
          .attr("y", 10)
          .text(s.label);
      });

      // Hide loading spinner
      document.getElementById("imgLoad").style.display = "none";
    });

  </script>
</body>
