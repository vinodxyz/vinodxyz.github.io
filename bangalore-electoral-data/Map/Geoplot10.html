    <style>
        body { margin:0; padding:0; }

        .marker {
            display: block;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
        }

        .maplibregl-popup {
                /*max-width: 100px;*/
                font: 12px/20px 'Helvetica Neue', Arial, Helvetica, sans-serif;
            }


          #sidebar {
            position: absolute;
            top: 0px;
            left: 0px;
            bottom: 0px;
            width: 550px;
            background: rgba(0, 0, 0, 1);
            font-family: "Arial";
            padding-left: 0px;
            overflow-y: scroll;
            overflow-x: hidden;
        }
        
        #sidebar::-webkit-scrollbar{
          width:5px;
        } 

        #sidebar::-webkit-scrollbar-thumb{
           background-color: rgba(255,255,255,0.5);
        }  


        #header{
          position: absolute;
          top: 0px;
          left: 0px;
          width: 535px;
          padding-left: 0px;
          z-index: 999999;
        }
    </style>

<body>

<div id="header"><object type="image/svg+xml" data="header.svg"></object></div>
<div id='map'></div>
<div id='sidebar'>
    <div id="tooltip-name"></div>
    <div id='tooltip'></div>
    <div id="agegraph" style="margin-top:-870px;margin-left:-15px;"></div>
</div>


<script>
$(document).ready(
  function()
  {
    $('#sidebar').hide();
  }
);

var geojson = dataset;

var map = new maplibregl.Map({
    container: 'map',
    style: 'https://tiles.openfreemap.org/styles/dark',
    center: [77.5712556, 12.97],
    zoom: 12
});

var geocoderApi = {
    forwardGeocode: async function(config) {
        var features = [];
        try {
            var request = 'https://nominatim.openstreetmap.org/search?q=' +
                encodeURIComponent(config.query) +
                '&format=geojson&polygon_geojson=1&addressdetails=1&bounded=1&viewbox=73,10,80,20';
            var response = await fetch(request);
            var geojson = await response.json();
            for (var feature of geojson.features) {
                var center = [
                    feature.bbox[0] + (feature.bbox[2] - feature.bbox[0]) / 2,
                    feature.bbox[1] + (feature.bbox[3] - feature.bbox[1]) / 2
                ];
                var point = {
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: center },
                    place_name: feature.properties.display_name,
                    properties: feature.properties,
                    text: feature.properties.display_name,
                    place_type: ['place'],
                    center: center
                };
                features.push(point);
            }
        } catch (e) {
            console.error('Failed to forwardGeocode with error: ' + e);
        }
        return { features: features };
    }
};

map.addControl(new MaplibreGeocoder(geocoderApi, { maplibregl: maplibregl }));

// add markers to map
geojson.features.forEach(function(marker) {
    // create a DOM element for the marker
    var el = document.createElement('div');
    el.className = 'marker';
    //el.style.backgroundImage = 'url("data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'30\' height=\'30\'><circle cx=\'15\' cy=\'15\' r=\'10\' /></svg>")';
    el.style.backgroundImage = 'url("data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' fill=\'white\' opacity=\''+17667/marker.properties.voters+'\' width=\''+marker.properties.voters/2000+'\' height=\''+marker.properties.voters/2000+'\'><circle cx=\''+(marker.properties.voters/4000)+'\' cy=\''+(marker.properties.voters/4000)+'\' r=\''+(marker.properties.voters/4000)+'\' /></svg>")';
    el.style.backgroundRepeat = 'no-repeat';
    el.style.width = ''+marker.properties.voters/2000+'px';
    el.style.height = ''+marker.properties.voters/2000+'px';

    // var popupText = "<p><strong><h3>"+marker.properties.ward+"</h3></strong>"+"Female voters# : "+marker.properties.female+"<br>"+
    // "Male voters : "+marker.properties.male+"<br>"+"Other voters : "+marker.properties.trans+"<br>"+
    // "Total voters : "+marker.properties.voters+"<br><br>"+"People with duplicate EPICs : "+marker.properties.EPICdupl+"<br>"+
    // "People with multiple EPICs (in same house) : "+marker.properties.EPICmult+"<br>"+"No. of houses with 10+ voters# : "
    // +marker.properties.tenplus

    // var popupText = "<p><strong><h3>"+marker.properties.ward+"</h3></strong></p>"+"<a href=\"Agegraph/plotly.html?ward="+marker.properties.ward+"\" target=\"_blank\">Link</a>";
    var popupText = "<p><strong><h3>"+marker.properties.ward+"</h3></strong></p>";
    //var popupText = "<div id=\"ward_name\">"+marker.properties.ward+"</div>";
    var popup = new maplibregl.Popup({offset: 25}).setHTML(popupText);

    // add marker to map
    new maplibregl.Marker({element: el, offset: [-10, -10]}).setLngLat(marker.geometry.coordinates).setPopup(popup).addTo(map);

    el.addEventListener('click', function() {
        var ward_name = marker.properties.ward;
        $('#sidebar').show();
        document.getElementById('tooltip-name').innerHTML = "<object type=\"image/svg+xml\" data=\"sidebar.svg?ward="+ward_name+"\"></object>";
        document.getElementById('agegraph').innerHTML = "<object type=\"text/html\" data=\"Agegraph/plotly.html?ward="+ward_name+"\" width=\"640px\" height=\"350px\" style=\"overflow:auto;\"></object>";
        $('#header').show();
        setTimeout(function(){$('#header').hide();}, 2000);
    });
});

  map.on('click', function(e){
      // clicking empty map area closes the sidebar
      if(document.getElementsByClassName("maplibregl-popup-content").length === 0) {
        $('#sidebar').hide();
        $('#header').show();
        document.getElementById('tooltip-name').innerHTML = "";
        document.getElementById('agegraph').innerHTML = "";
      }
  });
