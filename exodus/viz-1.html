<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Refugee Viz Playground</title>
        
        <link rel="stylesheet" href="css/styles.css">
        <script src="js/d3.js"></script>
        <script src="js/d3-voronoi.js"></script>
        
        <script src="js/jquery.min.js"></script>
        <link rel="stylesheet" href="css/bootstrap.min.css">
        <script src="js/bootstrap.min.js"></script>
<!--        <link href='//fonts.googleapis.com/css?family=Open+Sans:700,400,300' rel='stylesheet' type='text/css'>-->

    </head>
    <body>
        
        <div class="container-fluid">
            <div class="col-lg-6 graph-fixed">
                <div id="bubble-line-chart"></div>
            </div>
            <div class="col-lg-1 graph-fixed">
                <div id = "legend">
                    <div class="legendTitle"></div>
                    <div id="legend"></div>
                </div>
            </div>
            <div class="col-lg-3">
                <h3>
                    <span class="title">Battles and Victims</span>
                </h3>
                <span>
                Refugees are not terrorists. 
                They are often the first victims of terrorism.
                </span>
                <label id="form" for="show-voronoi">
                      <span class="disclaimer">Show Voronoi</span>
                      <input type="checkbox" id="show-voronoi" disabled>
                </label>
            </div>
        </div>
        
        <div class="container-fluid">
            <div class="col-lg-6 graph-fixed">
                <div id="war-chart"><div id="wartooltip"></div></div>
            </div>
            <div class="col-lg-1"></div>
            <div class="col-lg-3"></div>

                <span class="mediumbar">4 {4,0,0,0,6,29,70} 70</span>

                <span class="mediumdot">4 {4,0,0,0,6,29,70} 70</span>
                <span class="dotline">4 {4,0,0,0,6,29,70} 70</span>
            </div>

        <script type="text/javascript" src="js/viz1-scatter.js"></script>
        <script type="text/javascript" src="js/viz1-war-chart.js"></script>
